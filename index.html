<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixxel Library Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #reader button { 
            display: block !important;
            width: 100% !important;
            max-width: 300px !important;
            margin: 15px auto !important;
            padding: 14px !important;
            background-color: #2563eb !important;
            color: white !important;
            border-radius: 12px !important;
            font-weight: bold !important;
            border: none !important;
            cursor: pointer !important;
        }
        #reader select {
            width: 80% !important;
            padding: 10px !important;
            margin: 10px auto !important;
            display: block !important;
            background: #1e293b !important;
            color: white !important;
            border-radius: 8px !important;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-4">

    <div id="login-section" class="w-full max-w-sm mt-20">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tight text-blue-500">PIXXEL</h1>
            <p class="text-slate-400 uppercase tracking-widest text-xs mt-2 font-bold">Library Management</p>
        </div>
        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
            <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Pixxel Email</label>
            <input type="email" id="email-input" placeholder="id@pixxel.space" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 p-4 rounded-xl font-bold shadow-lg transition-all">Log In</button>
        </div>
    </div>

    <div id="app-section" class="w-full max-w-md hidden">
        <div class="flex justify-between items-start mb-6 bg-slate-800 p-4 rounded-2xl border border-slate-700">
            <div>
                <h2 id="welcome-msg" class="text-lg font-bold text-blue-400"></h2>
                <p class="text-[10px] text-slate-500 uppercase font-black">Authorized Session</p>
            </div>
            <button onclick="location.reload()" class="text-[10px] bg-slate-700 px-3 py-1 rounded-full uppercase font-bold text-slate-300">Logout</button>
        </div>

        <div id="scan-instructions" class="text-center p-4 bg-blue-900/20 rounded-xl mb-4 border border-blue-500/20">
            <p class="text-sm font-medium text-blue-300">Point at the Pixxel QR code on the inside cover.</p>
        </div>

        <div id="scanner-container">
            <div id="reader" class="overflow-hidden rounded-2xl border-2 border-slate-700 bg-slate-950 shadow-2xl"></div>
            <button id="rescan-btn" onclick="startScanner()" class="w-full mt-4 bg-slate-800 p-4 rounded-xl font-bold hidden border border-slate-700 hover:bg-slate-700 transition">Scan Another Book</button>
        </div>

        <div id="result-card" class="mt-6 p-6 bg-slate-800 rounded-2xl border border-blue-500/30 shadow-2xl hidden">
            <div class="flex items-center justify-between mb-4">
                <span class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-tighter" id="book-qr-tag"></span>
                <span class="text-[10px] text-slate-500 uppercase font-black" id="current-loc-tag"></span>
            </div>
            
            <h3 id="book-title" class="text-2xl font-bold mb-1 italic text-white">Title</h3>
            <p id="book-author" class="text-sm text-blue-400 mb-6 italic">Author</p>

            <div class="mb-6 p-4 bg-slate-900/50 rounded-xl border border-slate-700">
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 text-center tracking-widest">Confirm Transaction Location</label>
                <select id="transaction-location" class="w-full bg-slate-800 p-3 rounded-lg text-center font-bold text-white border border-slate-600 focus:border-blue-500 outline-none">
                    <option value="" disabled selected>-- Select Office --</option>
                    <option value="BLR-HQ">BLR-HQ (Bengaluru)</option>
                    <option value="BLR-HBR">BLR-HBR (Bengaluru)</option>
                    <option value="LA">LA (Los Angeles)</option>
                </select>
            </div>

            <div class="flex gap-4">
                <button onclick="processTransaction('Check-Out')" class="flex-1 bg-blue-600 p-4 rounded-xl font-black shadow-lg shadow-blue-900/40 active:scale-95 transition-all">CHECK OUT</button>
                <button onclick="processTransaction('Check-In')" class="flex-1 bg-emerald-600 p-4 rounded-xl font-black shadow-lg shadow-emerald-900/40 active:scale-95 transition-all">CHECK IN</button>
            </div>
        </div>
    </div>

    <div id="loader" class="mt-8 flex items-center gap-2 text-blue-500 font-bold hidden">
        <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span>Synchronizing with Database...</span>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDyrhnc3yWi6mV97Ma87cbClANbbs3IDL_E0bLPH5ByhAfpVxJNbLdlVi-0Z57HziSSA/exec";
        const urlParams = new URLSearchParams(window.location.search);
        let deepLinkQrId = urlParams.get('id'); 

        let currentUser = null;
        let currentQrId = null;
        let html5QrcodeScanner = null;

        async function handleLogin() {
            const email = document.getElementById('email-input').value.trim();
            if (!email.includes('@')) return alert("Enter your Pixxel Email");
            
            toggleLoader(true);
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getUser&email=${email}`);
                const user = await res.json();
                toggleLoader(false);

                if (user.exists) {
                    currentUser = { email, name: user.name };
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('app-section').classList.remove('hidden');
                    document.getElementById('welcome-msg').innerText = `Hi, ${user.name.split(' ')[0]}!`;
                    
                    if (deepLinkQrId) {
                        currentQrId = deepLinkQrId; 
                        fetchBook(deepLinkQrId);
                    } else {
                        startScanner();
                    }
                } else {
                    alert("Email not recognized.");
                }
            } catch (e) {
                alert("Auth Failed. Check Connection.");
                toggleLoader(false);
            }
        }

        function extractId(input) {
            if (input.includes('?id=')) {
                const url = new URL(input);
                return url.searchParams.get('id');
            }
            return input;
        }

        async function startScanner() {
            document.getElementById('rescan-btn').classList.add('hidden');
            document.getElementById('result-card').classList.add('hidden');
            const readerDiv = document.getElementById('reader');
            readerDiv.classList.remove('hidden');
            readerDiv.innerHTML = "";

            if (html5QrcodeScanner) {
                try { await html5QrcodeScanner.clear(); } catch (e) {}
            }

            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 15, qrbox: {width: 250, height: 250},
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            });
            html5QrcodeScanner.render(onScanSuccess);
        }

        function onScanSuccess(decodedText) {
            const bookId = extractId(decodedText);
            html5QrcodeScanner.clear().then(() => {
                document.getElementById('reader').classList.add('hidden');
                document.getElementById('rescan-btn').classList.remove('hidden');
                currentQrId = bookId;
                fetchBook(bookId);
            });
        }

        async function fetchBook(qrId) {
            toggleLoader(true);
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getBook&qrId=${qrId}`);
                const data = await res.json();
                toggleLoader(false);

                if(data.error) {
                    alert("Book not found.");
                    startScanner();
                    return;
                }

                document.getElementById('result-card').classList.remove('hidden');
                document.getElementById('book-qr-tag').innerText = data.qrId;
                document.getElementById('current-loc-tag').innerText = `Current Location: ${data.location}`;
                document.getElementById('book-title').innerText = data.title; 
                document.getElementById('book-author').innerText = `by ${data.author}`;
                // Clear the status text but keep for logic if needed
                console.log("Current Status: " + data.status);
            } catch (e) {
                alert("Fetch Error.");
                toggleLoader(false);
            }
        }

        async function processTransaction(type) {
            const locDropdown = document.getElementById('transaction-location');
            const office = locDropdown.value;

            if (!office) {
                alert("🚨 Mandatory: Select the office location.");
                locDropdown.classList.add('border-red-500');
                return;
            }

            toggleLoader(true);
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        qrId: currentQrId,
                        userEmail: currentUser.email,
                        type: type,
                        location: office
                    })
                });
                const result = await response.json();
                if (result.success) {
                    alert(`✅ SUCCESS: Book ${type}ed!`);
                    location.href = window.location.pathname; 
                } else {
                    alert(`❌ DENIED: ${result.error}`);
                    toggleLoader(false);
                }
            } catch (e) {
                alert("Transaction failed.");
                toggleLoader(false);
            }
        }

        function toggleLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
        }
    </script>
</body>
</html>
